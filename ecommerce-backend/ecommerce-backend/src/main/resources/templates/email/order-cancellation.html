<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px; }
        .info-box { background: white; padding: 20px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #f5576c; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ Đơn hàng đã bị hủy</h1>
        </div>
        <div class="content">
            <p>Xin chào,</p>
            <p>Đơn hàng <strong>#{{orderNo}}</strong> của bạn đã được hủy.</p>
            <div class="info-box">
                <p><strong>Lý do hủy:</strong></p>
                <p>{{reason}}</p>
            </div>
            <p>Nếu bạn có bất kỳ thắc mắc nào, vui lòng liên hệ với chúng tôi.</p>
        </div>
        <div class="footer">
            <p>© 2026 Cửa hàng của chúng tôi. Tất cả quyền được bảo lưu.</p>
        </div>
    </div>
</body>
</html>
