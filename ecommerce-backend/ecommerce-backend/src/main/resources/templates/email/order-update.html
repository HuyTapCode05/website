<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; border-radius: 10px 10px 0 0; }
        .content { background: #f9f9f9; padding: 30px; border-radius: 0 0 10px 10px; }
        .status-badge { display: inline-block; padding: 10px 20px; background: {{statusColor}}; color: white; border-radius: 20px; font-weight: bold; margin: 20px 0; }
        .footer { text-align: center; color: #999; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Cập nhật đơn hàng</h1>
        </div>
        <div class="content">
            <p>Xin chào,</p>
            <p>Đơn hàng <strong>#{{orderNo}}</strong> của bạn đã được cập nhật:</p>
            <div style="text-align: center;">
                <span class="status-badge">{{statusLabel}}</span>
            </div>
            <p style="background: white; padding: 15px; border-radius: 8px; margin-top: 20px;">
                {{message}}
            </p>
        </div>
        <div class="footer">
            <p>© 2026 Cửa hàng của chúng tôi. Tất cả quyền được bảo lưu.</p>
        </div>
    </div>
</body>
</html>
